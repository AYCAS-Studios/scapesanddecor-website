<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 756 456" role="img" aria-label="Scapes &amp; Décor business card">
  <defs>
    <style>
      .pf{font-family:'Playfair Display','Didot',Georgia,serif}
      .inter{font-family:'Inter','Helvetica Neue',Arial,sans-serif}
    </style>
  </defs>

  <!-- FRONT (top half) -->
  <g>
    <rect x="0" y="0" width="756" height="456" fill="#1F4029"/>
    <!-- accent bar -->
    <rect x="0" y="442" width="756" height="14" fill="#B8973C"/>
    <rect x="0" y="436" width="756" height="2" fill="#C4834A"/>

    <!-- mark, centred -->
    <g transform="translate(318 120)">
      <circle cx="60" cy="60" r="55" fill="none" stroke="#B8973C" stroke-width="1.8"/>
      <text x="46" y="86" class="pf" font-size="68" font-weight="700" fill="#FDFBF8" text-anchor="middle">S</text>
      <text x="74" y="86" class="pf" font-size="68" font-weight="700" fill="#C4834A" text-anchor="middle">D</text>
    </g>

    <!-- wordmark -->
    <text x="378" y="300" class="pf" font-size="36" font-weight="700" fill="#FDFBF8" text-anchor="middle">Scapes <tspan fill="#C4834A" font-style="italic" font-weight="400">&amp;</tspan> Décor</text>
    <text x="378" y="328" class="inter" font-size="11" font-weight="600" letter-spacing="4" fill="#B8973C" text-anchor="middle">PROPERTY SERVICES · EST. 2014</text>

    <!-- tagline -->
    <text x="378" y="400" class="pf" font-style="italic" font-size="13" fill="#E7E0D0" text-anchor="middle">Improved, maintained and well-presented environments.</text>
  </g>
</svg>
